<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 - 검은토끼흰토끼</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
    }

    /* ── 로그인 ── */
    .login-overlay {
      position: fixed; inset: 0;
      background: #0f0f0f;
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
    }
    .login-overlay.hidden { display: none; }
    .login-box {
      text-align: center;
      width: 320px;
    }
    .login-box h1 {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      font-weight: 600;
    }
    .login-box input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #fff;
      font-size: 0.95rem;
      margin-bottom: 1rem;
      outline: none;
    }
    .login-box input:focus { border-color: #555; }
    .login-box button {
      width: 100%;
      padding: 0.75rem;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }
    .login-box button:hover { background: #ddd; }
    .login-error {
      color: #ff4444;
      font-size: 0.8rem;
      margin-top: 0.5rem;
      min-height: 1.2em;
    }

    /* ── 레이아웃 ── */
    .app { display: flex; min-height: 100vh; }

    .sidebar {
      width: 220px;
      background: #141414;
      border-right: 1px solid #222;
      padding: 1.5rem 0;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
    }
    .sidebar-logo {
      padding: 0 1.25rem 1.5rem;
      font-size: 0.85rem;
      color: #666;
      border-bottom: 1px solid #222;
      margin-bottom: 0.5rem;
    }
    .sidebar-logo strong { color: #e0e0e0; font-size: 0.95rem; display: block; margin-bottom: 0.15rem; }
    .nav-item {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.65rem 1.25rem;
      color: #888;
      font-size: 0.9rem;
      cursor: pointer;
      border: none; background: none; width: 100%; text-align: left;
    }
    .nav-item:hover { color: #ccc; background: #1a1a1a; }
    .nav-item.active { color: #fff; background: #1f1f1f; }
    .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }

    .sidebar-bottom {
      margin-top: auto;
      padding: 1rem 1.25rem;
      border-top: 1px solid #222;
    }
    .btn-logout {
      display: flex; align-items: center; gap: 0.5rem;
      color: #666; font-size: 0.85rem;
      cursor: pointer; background: none; border: none;
    }
    .btn-logout:hover { color: #ff4444; }

    /* ── 메인 콘텐츠 ── */
    .content {
      flex: 1;
      padding: 2rem 2.5rem;
      overflow-y: auto;
    }
    .content-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 2rem;
    }
    .content-header h2 { font-size: 1.4rem; font-weight: 600; }

    .page { display: none; }
    .page.active { display: block; }

    /* ── 대시보드 ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .stat-card {
      background: #1a1a1a;
      border: 1px solid #252525;
      border-radius: 10px;
      padding: 1.25rem;
    }
    .stat-card .label { font-size: 0.8rem; color: #666; margin-bottom: 0.5rem; }
    .stat-card .value { font-size: 1.8rem; font-weight: 700; }

    .quick-links {
      display: flex; gap: 0.75rem; flex-wrap: wrap;
    }
    .quick-link {
      padding: 0.6rem 1.2rem;
      background: #1a1a1a;
      border: 1px solid #252525;
      border-radius: 8px;
      color: #aaa;
      font-size: 0.85rem;
      text-decoration: none;
      cursor: pointer;
    }
    .quick-link:hover { border-color: #444; color: #fff; }

    /* ── 테이블 ── */
    .btn-add {
      padding: 0.55rem 1.2rem;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-add:hover { background: #ddd; }

    .table-wrap {
      background: #141414;
      border: 1px solid #222;
      border-radius: 10px;
      overflow: hidden;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      text-align: left;
      padding: 0.85rem 1.25rem;
      font-size: 0.9rem;
    }
    th {
      background: #1a1a1a;
      color: #666;
      font-weight: 500;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      border-bottom: 1px solid #252525;
    }
    td { border-bottom: 1px solid #1e1e1e; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #181818; }

    .badge {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 500;
    }
    .badge-main { background: #1a3a1a; color: #4ade80; }
    .badge-sub { background: #1a2a3a; color: #60a5fa; }
    .badge-draft { background: #2a2a1a; color: #facc15; }
    .badge-published { background: #1a3a1a; color: #4ade80; }

    .actions { display: flex; gap: 0.5rem; }
    .btn-sm {
      padding: 0.3rem 0.7rem;
      border-radius: 5px;
      border: 1px solid #333;
      background: none;
      color: #aaa;
      font-size: 0.8rem;
      cursor: pointer;
    }
    .btn-sm:hover { border-color: #555; color: #fff; }
    .btn-sm.danger:hover { border-color: #ff4444; color: #ff4444; }

    .empty-state {
      text-align: center;
      padding: 3rem;
      color: #555;
    }

    /* ── 모달 ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center;
      z-index: 500;
    }
    .modal-overlay.hidden { display: none; }
    .modal {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 12px;
      width: 480px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 2rem;
    }
    .modal h3 {
      font-size: 1.15rem;
      margin-bottom: 1.5rem;
    }
    .form-group {
      margin-bottom: 1.25rem;
    }
    .form-group label {
      display: block;
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 0.4rem;
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 0.65rem 0.9rem;
      background: #111;
      border: 1px solid #333;
      border-radius: 7px;
      color: #e0e0e0;
      font-size: 0.9rem;
      outline: none;
      font-family: inherit;
    }
    .form-group textarea { resize: vertical; min-height: 80px; }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus { border-color: #555; }

    .modal-actions {
      display: flex; justify-content: flex-end; gap: 0.75rem;
      margin-top: 1.5rem;
    }
    .btn-cancel {
      padding: 0.6rem 1.2rem;
      background: none;
      border: 1px solid #333;
      border-radius: 8px;
      color: #aaa;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .btn-cancel:hover { border-color: #555; color: #fff; }
    .btn-save {
      padding: 0.6rem 1.5rem;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-save:hover { background: #ddd; }

    /* ── 확인 모달 ── */
    .confirm-text { color: #aaa; font-size: 0.9rem; line-height: 1.6; }
    .confirm-text strong { color: #ff6666; }
    .btn-delete {
      padding: 0.6rem 1.5rem;
      background: #ff4444;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-delete:hover { background: #cc3333; }

    /* ── 반응형 ── */
    @media (max-width: 768px) {
      .sidebar { width: 60px; }
      .sidebar-logo, .nav-item span, .sidebar-bottom span { display: none; }
      .nav-item { justify-content: center; padding: 0.75rem; }
      .content { padding: 1.5rem; }
      .modal { width: 95%; margin: 0 1rem; }
    }
  </style>
</head>
<body>

  <!-- 로그인 -->
  <div class="login-overlay" id="loginOverlay">
    <div class="login-box">
      <h1>관리자 로그인</h1>
      <input type="password" id="loginPw" placeholder="비밀번호 입력" autocomplete="off">
      <button onclick="tryLogin()">로그인</button>
      <div class="login-error" id="loginError"></div>
    </div>
  </div>

  <!-- 앱 -->
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <strong>검은토끼흰토끼</strong>
        Admin
      </div>
      <button class="nav-item active" data-page="dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span>대시보드</span>
      </button>
      <button class="nav-item" data-page="projects">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        <span>프로젝트</span>
      </button>
      <div class="sidebar-bottom">
        <button class="btn-logout" onclick="logout()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          <span>로그아웃</span>
        </button>
      </div>
    </aside>

    <main class="content">
      <!-- 대시보드 -->
      <div class="page active" id="page-dashboard">
        <div class="content-header">
          <h2>대시보드</h2>
        </div>
        <div class="stats-grid">
          <div class="stat-card">
            <div class="label">전체 프로젝트</div>
            <div class="value" id="statTotal">0</div>
          </div>
          <div class="stat-card">
            <div class="label">메인 프로젝트</div>
            <div class="value" id="statMain">0</div>
          </div>
          <div class="stat-card">
            <div class="label">서브 프로젝트</div>
            <div class="value" id="statSub">0</div>
          </div>
          <div class="stat-card">
            <div class="label">공개 중</div>
            <div class="value" id="statPublished">0</div>
          </div>
        </div>
        <h3 style="font-size:1rem; margin-bottom:1rem; color:#888;">바로가기</h3>
        <div class="quick-links">
          <a class="quick-link" href="../index.html" target="_blank">사이트 보기</a>
          <span class="quick-link" onclick="navigate('projects')">프로젝트 관리</span>
        </div>
      </div>

      <!-- 프로젝트 관리 -->
      <div class="page" id="page-projects">
        <div class="content-header">
          <h2>프로젝트 관리</h2>
          <button class="btn-add" onclick="openModal()">+ 새 프로젝트</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>제목</th>
                <th>타입</th>
                <th>태그</th>
                <th>상태</th>
                <th style="width:120px;">관리</th>
              </tr>
            </thead>
            <tbody id="projectTable"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- 추가/수정 모달 -->
  <div class="modal-overlay hidden" id="modalOverlay">
    <div class="modal">
      <h3 id="modalTitle">새 프로젝트</h3>
      <input type="hidden" id="editId">
      <div class="form-group">
        <label>프로젝트 제목</label>
        <input type="text" id="fTitle" placeholder="예: Pixel Drift">
      </div>
      <div class="form-group">
        <label>설명</label>
        <textarea id="fDesc" placeholder="프로젝트에 대한 간단한 설명"></textarea>
      </div>
      <div class="form-group">
        <label>태그</label>
        <input type="text" id="fTag" placeholder="예: Prototype, Game Jam, Tech Demo">
      </div>
      <div class="form-group">
        <label>타입</label>
        <select id="fType">
          <option value="main">메인 프로젝트</option>
          <option value="sub">서브 프로젝트</option>
        </select>
      </div>
      <div class="form-group">
        <label>상태</label>
        <select id="fStatus">
          <option value="published">공개</option>
          <option value="draft">비공개</option>
        </select>
      </div>
      <div class="form-group">
        <label>링크 URL (선택)</label>
        <input type="text" id="fLink" placeholder="https://...">
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">취소</button>
        <button class="btn-save" onclick="saveProject()">저장</button>
      </div>
    </div>
  </div>

  <!-- 삭제 확인 모달 -->
  <div class="modal-overlay hidden" id="confirmOverlay">
    <div class="modal" style="width:380px;">
      <h3>프로젝트 삭제</h3>
      <p class="confirm-text">
        <strong id="confirmName"></strong> 프로젝트를 삭제하시겠습니까?<br>이 작업은 되돌릴 수 없습니다.
      </p>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeConfirm()">취소</button>
        <button class="btn-delete" onclick="confirmDelete()">삭제</button>
      </div>
    </div>
  </div>

  <script>
    // ── 인증 ──
    const PW_HASH = '0aa28ff41b0c505cf6a8f497568a465452c26a31658a2d9d4ced08a2e7ced548';

    async function hashPw(pw) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
      return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function tryLogin() {
      const pw = document.getElementById('loginPw').value;
      const hash = await hashPw(pw);
      if (hash === PW_HASH) {
        sessionStorage.setItem('admin_auth', '1');
        document.getElementById('loginOverlay').classList.add('hidden');
      } else {
        document.getElementById('loginError').textContent = '비밀번호가 틀렸습니다.';
      }
    }

    document.getElementById('loginPw').addEventListener('keydown', e => {
      if (e.key === 'Enter') tryLogin();
    });

    function logout() {
      sessionStorage.removeItem('admin_auth');
      document.getElementById('loginOverlay').classList.remove('hidden');
      document.getElementById('loginPw').value = '';
      document.getElementById('loginError').textContent = '';
    }

    if (sessionStorage.getItem('admin_auth') === '1') {
      document.getElementById('loginOverlay').classList.add('hidden');
    }

    // ── 네비게이션 ──
    function navigate(page) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      document.getElementById('page-' + page).classList.add('active');
      document.querySelector(`.nav-item[data-page="${page}"]`).classList.add('active');
    }

    document.querySelectorAll('.nav-item').forEach(btn => {
      btn.addEventListener('click', () => navigate(btn.dataset.page));
    });

    // ── 데이터 ──
    const DEFAULT_PROJECTS = [
      { id: 1, title: '메인 트레일러', desc: '게임 트레일러 영상 영역', tag: 'Main', type: 'main', status: 'published', link: '#' },
      { id: 2, title: 'Pixel Drift', desc: '픽셀 아트 기반 레이싱 게임 프로토타입. 드리프트 물리엔진 실험.', tag: 'Prototype', type: 'sub', status: 'published', link: '#' },
      { id: 3, title: '72h Dungeon', desc: '72시간 게임잼에서 만든 로그라이크 던전 크롤러.', tag: 'Game Jam', type: 'sub', status: 'published', link: '#' },
      { id: 4, title: 'Fluid Shader', desc: '실시간 유체 시뮬레이션 셰이더 기술 데모.', tag: 'Tech Demo', type: 'sub', status: 'published', link: '#' },
      { id: 5, title: 'Stack Tower', desc: '원터치 캐주얼 타워 쌓기 미니게임.', tag: 'Mini Game', type: 'sub', status: 'published', link: '#' },
    ];

    function getProjects() {
      const raw = localStorage.getItem('bw_projects');
      if (!raw) {
        localStorage.setItem('bw_projects', JSON.stringify(DEFAULT_PROJECTS));
        return [...DEFAULT_PROJECTS];
      }
      return JSON.parse(raw);
    }

    function saveProjects(list) {
      localStorage.setItem('bw_projects', JSON.stringify(list));
    }

    function nextId(list) {
      return list.length ? Math.max(...list.map(p => p.id)) + 1 : 1;
    }

    // ── 렌더링 ──
    function render() {
      const projects = getProjects();

      // 대시보드 통계
      document.getElementById('statTotal').textContent = projects.length;
      document.getElementById('statMain').textContent = projects.filter(p => p.type === 'main').length;
      document.getElementById('statSub').textContent = projects.filter(p => p.type === 'sub').length;
      document.getElementById('statPublished').textContent = projects.filter(p => p.status === 'published').length;

      // 프로젝트 테이블
      const tbody = document.getElementById('projectTable');
      if (!projects.length) {
        tbody.innerHTML = '<tr><td colspan="5"><div class="empty-state">등록된 프로젝트가 없습니다.</div></td></tr>';
        return;
      }
      tbody.innerHTML = projects.map(p => `
        <tr>
          <td><strong>${esc(p.title)}</strong><br><span style="color:#666;font-size:0.8rem;">${esc(p.desc).substring(0, 50)}${p.desc.length > 50 ? '...' : ''}</span></td>
          <td><span class="badge ${p.type === 'main' ? 'badge-main' : 'badge-sub'}">${p.type === 'main' ? '메인' : '서브'}</span></td>
          <td style="color:#888;">${esc(p.tag)}</td>
          <td><span class="badge ${p.status === 'published' ? 'badge-published' : 'badge-draft'}">${p.status === 'published' ? '공개' : '비공개'}</span></td>
          <td>
            <div class="actions">
              <button class="btn-sm" onclick="openEdit(${p.id})">수정</button>
              <button class="btn-sm danger" onclick="openDelete(${p.id})">삭제</button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s || '';
      return d.innerHTML;
    }

    // ── 모달: 추가/수정 ──
    function openModal() {
      document.getElementById('modalTitle').textContent = '새 프로젝트';
      document.getElementById('editId').value = '';
      document.getElementById('fTitle').value = '';
      document.getElementById('fDesc').value = '';
      document.getElementById('fTag').value = '';
      document.getElementById('fType').value = 'sub';
      document.getElementById('fStatus').value = 'published';
      document.getElementById('fLink').value = '';
      document.getElementById('modalOverlay').classList.remove('hidden');
    }

    function openEdit(id) {
      const p = getProjects().find(x => x.id === id);
      if (!p) return;
      document.getElementById('modalTitle').textContent = '프로젝트 수정';
      document.getElementById('editId').value = id;
      document.getElementById('fTitle').value = p.title;
      document.getElementById('fDesc').value = p.desc;
      document.getElementById('fTag').value = p.tag;
      document.getElementById('fType').value = p.type;
      document.getElementById('fStatus').value = p.status;
      document.getElementById('fLink').value = p.link || '';
      document.getElementById('modalOverlay').classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.add('hidden');
    }

    function saveProject() {
      const title = document.getElementById('fTitle').value.trim();
      if (!title) { alert('제목을 입력해주세요.'); return; }

      const data = {
        title,
        desc: document.getElementById('fDesc').value.trim(),
        tag: document.getElementById('fTag').value.trim(),
        type: document.getElementById('fType').value,
        status: document.getElementById('fStatus').value,
        link: document.getElementById('fLink').value.trim() || '#',
      };

      const projects = getProjects();
      const editId = parseInt(document.getElementById('editId').value);

      if (editId) {
        const idx = projects.findIndex(p => p.id === editId);
        if (idx !== -1) projects[idx] = { ...projects[idx], ...data };
      } else {
        data.id = nextId(projects);
        projects.push(data);
      }

      saveProjects(projects);
      closeModal();
      render();
    }

    // ── 모달: 삭제 ──
    let deleteTargetId = null;

    function openDelete(id) {
      const p = getProjects().find(x => x.id === id);
      if (!p) return;
      deleteTargetId = id;
      document.getElementById('confirmName').textContent = p.title;
      document.getElementById('confirmOverlay').classList.remove('hidden');
    }

    function closeConfirm() {
      document.getElementById('confirmOverlay').classList.add('hidden');
      deleteTargetId = null;
    }

    function confirmDelete() {
      if (!deleteTargetId) return;
      const projects = getProjects().filter(p => p.id !== deleteTargetId);
      saveProjects(projects);
      closeConfirm();
      render();
    }

    // ── 모달 외부 클릭 닫기 ──
    document.getElementById('modalOverlay').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeModal();
    });
    document.getElementById('confirmOverlay').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeConfirm();
    });

    // 초기 렌더
    render();
  </script>
</body>
</html>
